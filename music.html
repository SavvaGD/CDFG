<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CDFG Music — Яндекс.Музыка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .header {
            text-align: center;
            padding: 1rem 0;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffcc00, #ff00aa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 0.8rem;
            color: #ffcc00;
            margin-top: 0.3rem;
        }

        .search-container {
            margin: 2rem 0;
        }

        .search-box {
            display: flex;
            gap: 0.5rem;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 60px;
            padding: 0.3rem;
            border: 1px solid rgba(255, 204, 0, 0.3);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.8rem 1.2rem;
            color: #e2e8f0;
            font-size: 1rem;
            outline: none;
        }

        .search-box input::placeholder {
            color: #64748b;
        }

        .search-box button {
            background: linear-gradient(135deg, #ffcc00, #ff00aa);
            border: none;
            border-radius: 60px;
            padding: 0.8rem 1.5rem;
            color: #0a0a0a;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-box button:hover {
            transform: scale(1.02);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #ffcc00;
        }

        .results {
            margin-top: 2rem;
        }

        .track-item {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            transition: all 0.2s;
            border-left: 3px solid #ffcc00;
        }

        .track-item:hover {
            background: rgba(30, 41, 59, 0.8);
        }

        .track-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .track-artist {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .yandex-link {
            display: inline-block;
            background: rgba(255, 204, 0, 0.2);
            border: 1px solid #ffcc00;
            border-radius: 40px;
            padding: 0.4rem 1rem;
            color: #ffcc00;
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .yandex-link:hover {
            background: #ffcc00;
            color: #0a0a0a;
        }

        .no-results, .error {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }

        .error {
            color: #ef4444;
        }

        .info {
            text-align: center;
            padding: 1rem;
            font-size: 0.7rem;
            color: #475569;
            margin-bottom: 80px;
        }

        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .search-box button { padding: 0.8rem 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">CDFG MUSIC</div>
            <div class="tagline">🎵 поиск музыки в Яндекс.Музыке</div>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Название песни или исполнитель..." autocomplete="off">
                <button id="searchBtn">🔍 Найти</button>
            </div>
        </div>

        <div class="results" id="resultsContainer">
            <div class="no-results">Введите запрос и нажмите «Найти»</div>
        </div>

        <div class="info">
            🎧 Открывается в Яндекс.Музыке | Без истории | Без слежки
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsContainer = document.getElementById('resultsContainer');

        async function search() {
            const query = searchInput.value.trim();
            
            if (query === "") {
                resultsContainer.innerHTML = '<div class="no-results">Введите запрос</div>';
                return;
            }

            resultsContainer.innerHTML = '<div class="loading">🎵 Ищем в Яндекс.Музыке...</div>';

            try {
                // Используем неофициальный API Яндекс.Музыки (для поиска)
                const proxyUrl = 'https://api.allorigins.win/get?url=';
                const apiUrl = `https://music.yandex.ru/handlers/music-search.jsx?text=${encodeURIComponent(query)}&type=all&page=0`;
                
                const response = await fetch(proxyUrl + encodeURIComponent(apiUrl));
                const data = await response.json();
                const html = data.contents;
                
                // Парсим HTML ответ (костыль, но работает)
                const tracks = parseTracksFromHtml(html);
                displayResults(tracks);
                
            } catch (error) {
                console.error(error);
                // Если API не работает — отправляем на поиск в Яндекс
                resultsContainer.innerHTML = `
                    <div class="error">
                        ⚠️ Результаты поиска<br>
                        <small>Открыть в Яндекс.Музыке:</small>
                    </div>
                    <div class="track-item">
                        <div class="track-title">Поиск: ${escapeHtml(query)}</div>
                        <div class="track-artist">Нажмите на ссылку, чтобы открыть в Яндекс.Музыке</div>
                        <a class="yandex-link" href="https://music.yandex.ru/search?text=${encodeURIComponent(query)}" target="_blank">🎵 Открыть в Яндекс.Музыке →</a>
                    </div>
                `;
            }
        }

        function parseTracksFromHtml(html) {
            // Простой парсинг — ищем блоки с треками
            const tracks = [];
            
            // Паттерн для поиска треков (упрощённо)
            const trackMatches = html.match(/data-bem='{"track":{[^}]+}/g);
            
            if (trackMatches) {
                for (let match of trackMatches) {
                    try {
                        const trackId = match.match(/id":(\d+)/);
                        const title = match.match(/title":"([^"]+)"/);
                        const artist = match.match(/artists":\[{"name":"([^"]+)"/);
                        
                        if (trackId && title) {
                            tracks.push({
                                id: trackId[1],
                                title: title[1],
                                artist: artist ? artist[1] : 'Неизвестен',
                                url: `https://music.yandex.ru/track/${trackId[1]}`
                            });
                        }
                    } catch(e) {}
                    if (tracks.length >= 10) break;
                }
            }
            
            return tracks;
        }

        function displayResults(tracks) {
            if (tracks.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        😕 Ничего не найдено по запросу «${escapeHtml(searchInput.value)}»<br><br>
                        <a class="yandex-link" href="https://music.yandex.ru/search?text=${encodeURIComponent(searchInput.value)}" target="_blank">🎵 Искать в Яндекс.Музыке →</a>
                    </div>
                `;
                return;
            }
            
            let html = '';
            for (let track of tracks) {
                html += `
                    <div class="track-item">
                        <div class="track-title">${escapeHtml(track.title)}</div>
                        <div class="track-artist">${escapeHtml(track.artist)}</div>
                        <a class="yandex-link" href="${track.url}" target="_blank">🎵 Слушать в Яндекс.Музыке →</a>
                    </div>
                `;
            }
            
            resultsContainer.innerHTML = html;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        searchBtn.addEventListener('click', search);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
