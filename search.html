<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CDFG Search — приватный поиск</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .header {
            text-align: center;
            padding: 1rem 0;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00ff88, #00b4d8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 0.8rem;
            color: #00ff88;
            margin-top: 0.3rem;
        }

        .search-container {
            margin: 2rem 0;
        }

        .search-box {
            display: flex;
            gap: 0.5rem;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 60px;
            padding: 0.3rem;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.8rem 1.2rem;
            color: #e2e8f0;
            font-size: 1rem;
            outline: none;
        }

        .search-box input::placeholder {
            color: #64748b;
        }

        .search-box button {
            background: linear-gradient(135deg, #00ff88, #00b4d8);
            border: none;
            border-radius: 60px;
            padding: 0.8rem 1.5rem;
            color: #0a0a0a;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-box button:hover {
            transform: scale(1.02);
        }

        .info {
            text-align: center;
            padding: 1rem;
            font-size: 0.7rem;
            color: #475569;
            margin-top: 2rem;
        }

        .engines {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .engine-btn {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 40px;
            padding: 0.5rem 1rem;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .engine-btn:hover {
            border-color: #00ff88;
            color: #00ff88;
        }

        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .search-box button { padding: 0.8rem 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">CDFG SEARCH</div>
            <div class="tagline">🔒 приватный поиск без слежки и истории</div>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Что ищем?.." autocomplete="off">
                <button id="searchBtn">🔍 Найти</button>
            </div>
        </div>

        <div class="engines">
            <span style="color:#64748b; font-size:0.75rem;">Поиск через:</span>
            <button class="engine-btn" data-engine="duckduckgo">🦆 DuckDuckGo</button>
            <button class="engine-btn" data-engine="google">🇬 Google</button>
            <button class="engine-btn" data-engine="bing">📘 Bing</button>
            <button class="engine-btn" data-engine="yandex">Яндекс</button>
        </div>

        <div class="info">
            🔒 Анонимный поиск | Без истории | Без слежки | Результаты открываются в этом же окне
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        let currentEngine = 'duckduckgo';

        // Настройка поисковых систем
        const searchUrls = {
            duckduckgo: 'https://duckduckgo.com/?q=',
            google: 'https://www.google.com/search?q=',
            bing: 'https://www.bing.com/search?q=',
            yandex: 'https://yandex.ru/search/?text='
        };

        // Выбор поисковой системы
        document.querySelectorAll('.engine-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.engine-btn').forEach(b => {
                    b.style.borderColor = 'rgba(0, 255, 136, 0.3)';
                    b.style.color = '#94a3b8';
                });
                btn.style.borderColor = '#00ff88';
                btn.style.color = '#00ff88';
                currentEngine = btn.dataset.engine;
                
                // Если есть текст в поиске — сразу ищем
                const query = searchInput.value.trim();
                if (query !== '') {
                    performSearch(query);
                }
            });
        });

        function performSearch(query) {
            if (query === '') return;
            
            const url = searchUrls[currentEngine] + encodeURIComponent(query);
            // Перенаправляем текущее окно на поисковую выдачу
            window.location.href = url;
        }

        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query === '') return;
            performSearch(query);
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query === '') return;
                performSearch(query);
            }
        });
    </script>
</body>
</html>
