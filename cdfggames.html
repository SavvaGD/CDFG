<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CDFG Games — портал игр</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .header {
            text-align: center;
            padding: 1rem 0;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00ff88, #ff00aa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 0.8rem;
            color: #00ff88;
            margin-top: 0.3rem;
        }

        .search-container {
            margin: 2rem 0;
            display: flex;
            justify-content: center;
        }

        .search-box {
            width: 100%;
            max-width: 400px;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 60px;
            padding: 0.8rem 1.2rem;
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #e2e8f0;
            font-size: 1rem;
            outline: none;
        }

        .search-box::placeholder {
            color: #64748b;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #00ff88;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .game-card {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 20px;
            padding: 1rem;
            transition: all 0.2s;
            border: 1px solid rgba(0, 255, 136, 0.2);
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-4px);
            border-color: #00ff88;
            background: rgba(30, 41, 59, 0.8);
        }

        .game-icon {
            width: 100%;
            height: 160px;
            background: #1e293b;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 0.8rem;
        }

        .game-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-icon .no-icon {
            font-size: 3rem;
        }

        .game-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .game-description {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .game-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #64748b;
            margin-bottom: 0.3rem;
        }

        .game-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-top: 0.3rem;
        }

        .tag {
            background: rgba(0, 255, 136, 0.2);
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.6rem;
            color: #00ff88;
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }

        .info {
            text-align: center;
            padding: 1rem;
            font-size: 0.7rem;
            color: #475569;
            margin-top: 2rem;
        }

        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .games-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">CDFG GAMES</div>
            <div class="tagline">🎮 бесплатные игры, без слежки</div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Поиск игр..." autocomplete="off">
        </div>

        <div class="games-grid" id="gamesGrid">
            <div class="loading">🎮 Загрузка игр...</div>
        </div>

        <div class="info">
            🎮 Нажми на игру, чтобы начать
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const gamesGrid = document.getElementById('gamesGrid');
        
        let allGames = [];

        async function loadGames() {
            gamesGrid.innerHTML = '<div class="loading">🎮 Загрузка игр...</div>';
            
            try {
                const listResponse = await fetch('games/list.json');
                if (!listResponse.ok) throw new Error();
                const list = await listResponse.json();
                const gameFolders = list.games || [];
                
                const games = [];
                
                for (const gameFolder of gameFolders) {
                    try {
                        const mainCheck = await fetch(`games/${gameFolder}/main.html`, { method: 'HEAD' });
                        if (!mainCheck.ok) continue;
                        
                        const infoResponse = await fetch(`games/${gameFolder}/info.json`);
                        let gameInfo = {
                            title: gameFolder,
                            description: 'Описание отсутствует',
                            genre: 'Игра',
                            rating: 'Новинка',
                            icon: null,
                            tags: [],
                            author: 'CDFG Games',
                            controls: 'Не указано'
                        };
                        
                        if (infoResponse.ok) {
                            const info = await infoResponse.json();
                            gameInfo = { ...gameInfo, ...info };
                        }
                        
                        if (gameInfo.icon) {
                            const iconCheck = await fetch(`games/${gameFolder}/${gameInfo.icon}`, { method: 'HEAD' });
                            if (!iconCheck.ok) gameInfo.icon = null;
                        }
                        
                        gameInfo.folder = gameFolder;
                        games.push(gameInfo);
                    } catch(e) {
                        console.error(`Ошибка загрузки ${gameFolder}:`, e);
                    }
                }
                
                allGames = games;
                displayGames(allGames);
                
            } catch (error) {
                gamesGrid.innerHTML = '<div class="no-results">😕 Игры не найдены</div>';
            }
        }

        function displayGames(games) {
            if (games.length === 0) {
                gamesGrid.innerHTML = '<div class="no-results">😕 Игры не найдены</div>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < games.length; i++) {
                const game = games[i];
                const iconHtml = game.icon 
                    ? `<img src="games/${game.folder}/${game.icon}" alt="${game.title}" onerror="this.parentElement.innerHTML='<div class=\'no-icon\'>🎮</div>'">`
                    : `<div class="no-icon">🎮</div>`;
                
                // Звёздочки для рейтинга
                let stars = '';
                const rating = parseFloat(game.rating);
                if (!isNaN(rating)) {
                    const fullStars = Math.floor(rating);
                    for (let s = 0; s < fullStars; s++) stars += '⭐';
                    if (rating - fullStars >= 0.5) stars += '½';
                } else {
                    stars = game.rating;
                }
                
                html += `
                    <div class="game-card" data-index="${i}">
                        <div class="game-icon">
                            ${iconHtml}
                        </div>
                        <div class="game-title">${escapeHtml(game.title)}</div>
                        <div class="game-description">${escapeHtml(game.description)}</div>
                        <div class="game-meta">
                            <span>🎮 ${escapeHtml(game.genre)}</span>
                            <span>⭐ ${stars}</span>
                        </div>
                        <div class="game-meta">
                            <span>👤 ${escapeHtml(game.author)}</span>
                            <span>🎮 ${escapeHtml(game.controls)}</span>
                        </div>
                        ${game.tags && game.tags.length ? `
                            <div class="game-tags">
                                ${game.tags.map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            }
            
            gamesGrid.innerHTML = html;
            
            document.querySelectorAll('.game-card').forEach(card => {
                card.addEventListener('click', () => {
                    const index = parseInt(card.dataset.index);
                    const game = allGames[index];
                    window.location.href = `game-wrapper.html?game=${encodeURIComponent(game.folder)}&title=${encodeURIComponent(game.title)}`;
                });
            });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase().trim();
            if (query === '') {
                displayGames(allGames);
                return;
            }
            
            const filtered = allGames.filter(game => 
                game.title.toLowerCase().includes(query) ||
                (game.description && game.description.toLowerCase().includes(query)) ||
                (game.tags && game.tags.some(tag => tag.toLowerCase().includes(query))) ||
                (game.genre && game.genre.toLowerCase().includes(query))
            );
            displayGames(filtered);
        });

        loadGames();
    </script>
</body>
    </html>
