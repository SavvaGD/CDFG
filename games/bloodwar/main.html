<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Blood War — CDFG Games</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', 'Segoe UI', monospace;
        }
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .menu-panel {
            position: absolute;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            border: 2px solid #8b0000;
            border-radius: 20px;
            padding: 20px;
            color: #ffaaaa;
            pointer-events: auto;
            max-width: 90%;
            max-height: 90%;
            overflow-y: auto;
            font-family: monospace;
        }
        .menu-center {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            max-width: 90%;
        }
        .menu-bottom {
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            pointer-events: auto;
            padding: 12px;
        }
        button {
            background: #3a0a0a;
            border: 1px solid #aa3333;
            color: #ffaaaa;
            padding: 8px 16px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            pointer-events: auto;
        }
        button:active { transform: scale(0.96); }
        .stat {
            display: inline-block;
            background: #1a0505;
            padding: 4px 12px;
            border-radius: 20px;
            margin: 4px;
            font-size: 0.9rem;
        }
        .enemy-card {
            background: #2a0a0a;
            margin: 8px 0;
            padding: 10px;
            border-radius: 12px;
            border-left: 3px solid #ff4444;
            cursor: pointer;
        }
        h3 { color: #ff6666; margin: 8px 0; }
        .resource-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 12px;
        }
        .wave-info {
            background: #1a0505;
            padding: 8px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 10px;
        }
        @media (max-width: 600px) {
            .menu-center { width: 95%; padding: 12px; }
            button { padding: 6px 10px; font-size: 0.7rem; }
            .stat { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="ui-overlay">
        <!-- Экран выбора Саваи -->
        <div id="selectionScreen" class="menu-panel menu-center">
            <h2>🔥 BLOOD WAR 🔥</h2>
            <p>3046 год. Вы — правитель Геймо. Выберите Саваю:</p>
            <div id="savaiList"></div>
            <button id="startWarBtn" disabled style="margin-top:16px;">⚔️ НАЧАТЬ ВОЙНУ ⚔️</button>
        </div>

        <!-- Экран боя -->
        <div id="battleScreen" style="display:none;">
            <div class="menu-panel menu-bottom" id="actionPanel">
                <div class="resource-bar">
                    <span class="stat">💰 <span id="money">5000</span> Г.долл.</span>
                    <span class="stat">⚔️ <span id="infantry">0</span> пехота</span>
                    <span class="stat">🎯 <span id="spec">0</span> спец.</span>
                    <span class="stat">🛸 <span id="drones">0</span> дроны</span>
                    <span class="stat">💣 <span id="tanks">0</span> танки</span>
                    <span class="stat">🛡️ <span id="heavy">0</span> броня</span>
                </div>
                <div class="wave-info" id="waveInfo">⚔️ ВОЛНА 0 / 0 ⚔️</div>
                <div id="shopPanel" style="display:flex; flex-wrap:wrap; gap:6px; justify-content:center;">
                    <button id="buyInfantry">⚔️ Пехота (100💰)</button>
                    <button id="buySpec">🎯 Спец (200💰)</button>
                    <button id="buyDrone">🛸 Дрон (250💰)</button>
                    <button id="buyTank">💣 Танк (500💰)</button>
                    <button id="buyHeavy">🛡️ Броня (1000💰)</button>
                    <button id="nextWaveBtn" style="background:#8b0000;">⚔️ СЛЕДУЮЩАЯ ВОЛНА ⚔️</button>
                </div>
            </div>
            <div id="victoryScreen" class="menu-panel menu-center" style="display:none;">
                <h2>🏆 ПОБЕДА! 🏆</h2>
                <p id="victoryText"></p>
                <button id="resetGameBtn">🔄 Новая игра</button>
            </div>
            <div id="defeatScreen" class="menu-panel menu-center" style="display:none;">
                <h2>💀 ПОРАЖЕНИЕ 💀</h2>
                <p>Геймо пал под натиском ОСС...</p>
                <button id="resetDefeatBtn">🔄 Новая игра</button>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        // ---------- САВАИ ----------
        const SAVAI_LIST = [
            { name: "Этерия", fullName: "Этерийская Савая", oldName: "Республика Этерия", capital: "Астраполис", budget: 100000, enemiesTotal: 100, description: "Бедная, но гордая. Мало ресурсов, но фанатичны." },
            { name: "Новая Савая", fullName: "Новая Савая", oldName: "Новосавайское царство", capital: "Оло (бывшая — Прелия)", budget: 1000000, enemiesTotal: 1000, description: "Средняя сила. Хорошо организованная армия." },
            { name: "Саванкатр", fullName: "Саванкатровская Савая", oldName: "Михаилское княжество", capital: "Саванград (бывшая — Проннская земля)", budget: 1000000000, enemiesTotal: 100000, description: "Сердце ОСС. Огромная армия. Элитные войска." }
        ];
        
        let selectedSavai = null;
        let gameActive = false;
        let currentWave = 0;
        let enemiesRemaining = 0;
        let playerMoney = 5000;
        let army = { infantry: 0, spec: 0, drones: 0, tanks: 0, heavy: 0 };
        
        // 3D сцена
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a0202);
        scene.fog = new THREE.FogExp2(0x1a0202, 0.008);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 12, 20);
        camera.lookAt(0, 0, 0);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // Освещение
        const ambientLight = new THREE.AmbientLight(0x332222);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffaa88, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        // Земля
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), new THREE.MeshStandardMaterial({ color: 0x4a2a2a, roughness: 0.8 }));
        ground.rotation.x = -Math.PI/2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);
        
        const gridHelper = new THREE.GridHelper(30, 20, 0xaa5555, 0x552222);
        gridHelper.position.y = -0.4;
        scene.add(gridHelper);
        
        let units = [];
        function clearUnits() { units.forEach(u => scene.remove(u)); units = []; }
        
        function addUnit(x, z, color, type) {
            const group = new THREE.Group();
            if (type === 'infantry') {
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({ color }));
                body.position.y = 0.3;
                group.add(body);
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffccaa }));
                head.position.y = 0.8;
                group.add(head);
            } else if (type === 'spec') {
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 0.8, 6), new THREE.MeshStandardMaterial({ color }));
                body.position.y = 0.4;
                group.add(body);
                const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.5, 4), new THREE.MeshStandardMaterial({ color: 0xffaa00 }));
                ant.position.y = 0.9;
                group.add(ant);
            } else if (type === 'drone') {
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.2, 0.7), new THREE.MeshStandardMaterial({ color }));
                body.position.y = 0.5;
                group.add(body);
                const rotor = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.05, 0.2), new THREE.MeshStandardMaterial({ color: 0x888888 }));
                rotor.position.y = 0.7;
                group.add(rotor);
            } else if (type === 'tank') {
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.4, 1.2), new THREE.MeshStandardMaterial({ color }));
                body.position.y = 0.2;
                group.add(body);
                const turret = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.3, 6), new THREE.MeshStandardMaterial({ color: 0x886666 }));
                turret.position.y = 0.5;
                group.add(turret);
            } else if (type === 'heavy') {
                const body = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.5, 1.4), new THREE.MeshStandardMaterial({ color }));
                body.position.y = 0.25;
                group.add(body);
                const turret = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 0.4, 6), new THREE.MeshStandardMaterial({ color: 0xaa8866 }));
                turret.position.y = 0.6;
                group.add(turret);
                const cannon = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.8, 4), new THREE.MeshStandardMaterial({ color: 0xccaa88 }));
                cannon.rotation.z = Math.PI/2;
                cannon.position.x = 0.7;
                cannon.position.y = 0.65;
                group.add(cannon);
            }
            group.position.set(x, 0, z);
            scene.add(group);
            return group;
        }
        
        function updateBattlefield() {
            clearUnits();
            let x = -8, z = 2;
            let i=0;
            for(i=0; i<Math.min(army.infantry, 15); i++) units.push(addUnit(x + (i%5)*1.2, z - Math.floor(i/5)*1.2, 0x44aa44, 'infantry'));
            for(i=0; i<Math.min(army.spec, 10); i++) units.push(addUnit(x + (i%4)*1.3, z-2 - Math.floor(i/4)*1.3, 0x44aaff, 'spec'));
            for(i=0; i<Math.min(army.drones, 10); i++) units.push(addUnit(x + (i%4)*1.1, z-4 - Math.floor(i/4)*1.1, 0x88aaff, 'drone'));
            for(i=0; i<Math.min(army.tanks, 8); i++) units.push(addUnit(x + (i%3)*1.4, z-6 - Math.floor(i/3)*1.4, 0xaa8866, 'tank'));
            for(i=0; i<Math.min(army.heavy, 5); i++) units.push(addUnit(x + (i%2)*1.6, z-8 - Math.floor(i/2)*1.6, 0xcc8866, 'heavy'));
        }
        
        // UI
        const selectionScreen = document.getElementById('selectionScreen');
        const battleScreen = document.getElementById('battleScreen');
        const victoryScreen = document.getElementById('victoryScreen');
        const defeatScreen = document.getElementById('defeatScreen');
        const savaiListDiv = document.getElementById('savaiList');
        const startWarBtn = document.getElementById('startWarBtn');
        
        function renderSavaiList() {
            savaiListDiv.innerHTML = '';
            SAVAI_LIST.forEach(s => {
                const card = document.createElement('div');
                card.className = 'enemy-card';
                card.innerHTML = `<strong>${s.name}</strong><br>💰 Бюджет: ${s.budget.toLocaleString()} с.руб.<br>⚔️ Врагов: ${s.enemiesTotal.toLocaleString()}<br><small>${s.description}</small>`;
                card.onclick = () => {
                    document.querySelectorAll('.enemy-card').forEach(c => c.style.borderLeft = '3px solid #ff4444');
                    card.style.borderLeft = '3px solid #00ff00';
                    selectedSavai = s;
                    startWarBtn.disabled = false;
                };
                savaiListDiv.appendChild(card);
            });
        }
        
        function updateUI() {
            document.getElementById('money').innerText = playerMoney;
            document.getElementById('infantry').innerText = army.infantry;
            document.getElementById('spec').innerText = army.spec;
            document.getElementById('drones').innerText = army.drones;
            document.getElementById('tanks').innerText = army.tanks;
            document.getElementById('heavy').innerText = army.heavy;
            if (selectedSavai) {
                document.getElementById('waveInfo').innerHTML = `⚔️ ВОЛНА ${currentWave} / ${selectedSavai.enemiesTotal} | ОСТАЛОСЬ ВРАГОВ: ${enemiesRemaining} ⚔️`;
            }
        }
        
        function buy(unit, cost) {
            if (!gameActive) return;
            if (playerMoney >= cost) {
                playerMoney -= cost;
                if (unit === 'infantry') army.infantry++;
                if (unit === 'spec') army.spec++;
                if (unit === 'drone') army.drones++;
                if (unit === 'tank') army.tanks++;
                if (unit === 'heavy') army.heavy++;
                updateUI();
                updateBattlefield();
            }
        }
        
        function nextWave() {
            if (!gameActive) return;
            // Сила армии Геймо
            let power = army.infantry*10 + army.spec*15 + army.drones*20 + army.tanks*45 + army.heavy*90;
            // Сила волны (зависит от бюджета Саваи и номера волны)
            let wavePower = (50 + currentWave * 3) * (selectedSavai.budget / 100000);
            let success = power >= wavePower;
            
            if (success) {
                let reward = 200 + currentWave * 20;
                playerMoney += reward;
                enemiesRemaining--;
                currentWave++;
                updateUI();
                updateBattlefield();
                if (currentWave >= selectedSavai.enemiesTotal) {
                    victory();
                } else {
                    document.getElementById('waveInfo').innerHTML = `⚔️ ВОЛНА ${currentWave} ОТБИТА! +${reward}💰 ⚔️<br>ОСТАЛОСЬ ВРАГОВ: ${enemiesRemaining}`;
                }
            } else {
                // Потери
                army.infantry = Math.max(0, Math.floor(army.infantry * 0.7));
                army.spec = Math.max(0, Math.floor(army.spec * 0.7));
                army.drones = Math.max(0, Math.floor(army.drones * 0.7));
                army.tanks = Math.max(0, Math.floor(army.tanks * 0.7));
                army.heavy = Math.max(0, Math.floor(army.heavy * 0.7));
                updateUI();
                updateBattlefield();
                if (army.infantry===0 && army.spec===0 && army.drones===0 && army.tanks===0 && army.heavy===0) {
                    defeat();
                } else {
                    document.getElementById('waveInfo').innerHTML = `💥 ВОЛНА ${currentWave+1} НЕ ОТБИТА! ПОТЕРИ! 💥<br>ОСТАЛОСЬ ВРАГОВ: ${enemiesRemaining}`;
                }
            }
        }
        
        function startWar() {
            if (!selectedSavai) return;
            selectionScreen.style.display = 'none';
            battleScreen.style.display = 'block';
            gameActive = true;
            currentWave = 0;
            enemiesRemaining = selectedSavai.enemiesTotal;
            playerMoney = 5000;
            army = { infantry: 0, spec: 0, drones: 0, tanks: 0, heavy: 0 };
            updateUI();
            updateBattlefield();
            document.getElementById('waveInfo').innerHTML = `⚔️ ВОЙНА С ${selectedSavai.name}! ВРАГОВ: ${enemiesRemaining} ⚔️`;
        }
        
        function victory() {
            gameActive = false;
            victoryScreen.style.display = 'flex';
            document.getElementById('victoryText').innerHTML = `Вы уничтожили ${selectedSavai.name}! Геймо выстоял.`;
        }
        
        function defeat() {
            gameActive = false;
            defeatScreen.style.display = 'flex';
        }
        
        function resetGame() {
            victoryScreen.style.display = 'none';
            defeatScreen.style.display = 'none';
            selectionScreen.style.display = 'flex';
            battleScreen.style.display = 'none';
            selectedSavai = null;
            startWarBtn.disabled = true;
            gameActive = false;
            clearUnits();
        }
        
        document.getElementById('buyInfantry').onclick = () => buy('infantry', 100);
        document.getElementById('buySpec').onclick = () => buy('spec', 200);
        document.getElementById('buyDrone').onclick = () => buy('drone', 250);
        document.getElementById('buyTank').onclick = () => buy('tank', 500);
        document.getElementById('buyHeavy').onclick = () => buy('heavy', 1000);
        document.getElementById('nextWaveBtn').onclick = () => nextWave();
        document.getElementById('resetGameBtn').onclick = () => resetGame();
        document.getElementById('resetDefeatBtn').onclick = () => resetGame();
        
        renderSavaiList();
        
        let time = 0;
        function animateCamera() {
            if (!gameActive) return;
            time += 0.01;
            camera.position.x = 15 + Math.sin(time) * 0.5;
            camera.position.z = 20 + Math.cos(time*0.7) * 0.5;
            camera.lookAt(0, 0, 0);
        }
        
        function renderLoop() {
            animateCamera();
            renderer.render(scene, camera);
            requestAnimationFrame(renderLoop);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        renderLoop();
    </script>
</body>
    </html>
