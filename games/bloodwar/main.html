<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Blood War — CDFG Games</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a0a0a 0%, #0a0101 100%);
            font-family: 'Courier New', monospace;
            padding: 16px;
        }
        .game-container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(0,0,0,0.8);
            border-radius: 24px;
            padding: 20px;
            border: 2px solid #8b0000;
        }
        .title {
            text-align: center;
            font-size: 2rem;
            color: #ff4444;
            margin-bottom: 20px;
        }
        .savai-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .savai-card {
            background: #2a0a0a;
            border: 2px solid #8b0000;
            border-radius: 16px;
            padding: 16px;
            width: 200px;
            cursor: pointer;
        }
        .savai-card.selected { border-color: #00ff00; background: #3a1a1a; }
        .savai-name { font-size: 1.3rem; font-weight: bold; color: #ff8888; }
        .savai-desc { font-size: 0.7rem; color: #aa8888; }
        .resources {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            background: #1a0505;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .resource { background: #2a0a0a; padding: 6px 12px; border-radius: 20px; }
        .shop {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .shop-btn {
            background: #3a0a0a;
            border: 1px solid #aa3333;
            color: #ffaaaa;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }
        .shop-btn:active { transform: scale(0.96); }
        .battlefield {
            background: #2a4a2a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            min-height: 150px;
        }
        .army-icons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        .unit-icon {
            background: #1a2a1a;
            border-radius: 12px;
            padding: 6px 12px;
            text-align: center;
            min-width: 80px;
            border: 1px solid #44ff44;
        }
        .enemy-icon {
            background: #2a1a1a;
            border-radius: 12px;
            padding: 6px 12px;
            text-align: center;
            min-width: 80px;
            border: 1px solid #ff4444;
        }
        .wave-info { text-align: center; margin: 16px 0; font-size: 1.2rem; }
        button {
            background: #8b0000;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .log {
            background: #0a0202;
            height: 120px;
            overflow-y: auto;
            padding: 8px;
            border-radius: 16px;
            font-size: 0.75rem;
            margin-top: 16px;
        }
        .log p { margin: 4px 0; border-left: 2px solid #8b0000; padding-left: 8px; }
        @media (max-width: 600px) {
            .unit-icon, .enemy-icon { min-width: 60px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="title">🔥 BLOOD WAR 🔥</div>
    
    <div id="savaiSelection">
        <div class="savai-selector" id="savaiList"></div>
        <button id="startWarBtn" disabled>⚔️ НАЧАТЬ ВОЙНУ ⚔️</button>
    </div>

    <div id="gameScreen" style="display:none;">
        <div class="resources">
            <span class="resource">💰 <span id="money">5000</span> Г.долл.</span>
            <span class="resource">⚔️ ВОЛНА <span id="waveNum">0</span></span>
            <span class="resource">💀 ВРАГОВ ОСТАЛОСЬ: <span id="enemiesLeft">0</span></span>
        </div>

        <div class="shop">
            <div class="shop-btn" data-unit="infantry" data-cost="100">⚔️ Пехота (100💰)</div>
            <div class="shop-btn" data-unit="spec" data-cost="200">🎯 Спец (200💰)</div>
            <div class="shop-btn" data-unit="drone" data-cost="250">🛸 Дрон (250💰)</div>
            <div class="shop-btn" data-unit="tank" data-cost="500">💣 Танк (500💰)</div>
            <div class="shop-btn" data-unit="heavy" data-cost="1000">🛡️ Броня (1000💰)</div>
        </div>

        <div class="battlefield" id="battlefield">
            <div class="army-icons" id="armyDisplay">⚔️ ВАША АРМИЯ: (пусто)</div>
            <div class="army-icons" id="enemyDisplay">💀 ВРАГИ В ЭТОЙ ВОЛНЕ: (пусто)</div>
        </div>

        <div class="wave-info" id="waveInfo">⚔️ НАЖМИТЕ «СЛЕДУЮЩАЯ ВОЛНА» ⚔️</div>
        <button id="nextWaveBtn">⚔️ СЛЕДУЮЩАЯ ВОЛНА ⚔️</button>
        <div class="log" id="log"></div>
    </div>

    <div id="endScreen" style="display:none; text-align:center;">
        <h2 id="endTitle"></h2>
        <p id="endText"></p>
        <button id="resetBtn">🔄 НОВАЯ ИГРА</button>
    </div>
</div>

<script>
    const SAVAI_LIST = [
        { name: "Этерия", capital: "Астраполис", budget: 100000, enemiesTotal: 100, description: "Бедная, но гордая." },
        { name: "Новая Савая", capital: "Оло", budget: 1000000, enemiesTotal: 1000, description: "Средняя сила." },
        { name: "Саванкатр", capital: "Саванград", budget: 1000000000, enemiesTotal: 100000, description: "Сердце ОСС." }
    ];
    
    const UNIT_TYPES = {
        infantry: { name: "Пехота", power: 10, cost: 100, icon: "⚔️" },
        spec: { name: "Спец", power: 15, cost: 200, icon: "🎯" },
        drone: { name: "Дрон", power: 20, cost: 250, icon: "🛸" },
        tank: { name: "Танк", power: 45, cost: 500, icon: "💣" },
        heavy: { name: "Броня", power: 90, cost: 1000, icon: "🛡️" }
    };
    
    const ENEMY_TYPES = [
        { name: "Пехота ОСС", power: 8, icon: "⚔️" },
        { name: "Террорист", power: 12, icon: "💣" },
        { name: "Дрон ОСС", power: 18, icon: "🛸" },
        { name: "Танк ОСС", power: 40, icon: "💣" },
        { name: "Броня ОСС", power: 80, icon: "🛡️" }
    ];
    
    let selectedSavai = null;
    let gameActive = false;
    let currentWave = 0;
    let enemiesRemaining = 0;
    let playerMoney = 5000;
    let army = { infantry: 0, spec: 0, drone: 0, tank: 0, heavy: 0 };
    let currentWaveEnemies = [];
    
    function generateWaveEnemies() {
        let count = 3 + Math.floor(Math.random() * 5) + Math.floor(currentWave / 5);
        let enemies = [];
        for(let i=0; i<count; i++) {
            let r = Math.random();
            if (r < 0.4) enemies.push({...ENEMY_TYPES[0]});
            else if (r < 0.55) enemies.push({...ENEMY_TYPES[1]});
            else if (r < 0.7) enemies.push({...ENEMY_TYPES[2]});
            else if (r < 0.85) enemies.push({...ENEMY_TYPES[3]});
            else enemies.push({...ENEMY_TYPES[4]});
        }
        let budgetMod = Math.min(2, Math.max(0.5, selectedSavai.budget / 100000));
        return enemies.map(e => ({ ...e, power: Math.floor(e.power * budgetMod) }));
    }
    
    function updateUI() {
        document.getElementById('money').innerText = playerMoney;
        document.getElementById('waveNum').innerText = currentWave;
        document.getElementById('enemiesLeft').innerText = enemiesRemaining;
        
        let armyHtml = '';
        for(let [type, count] of Object.entries(army)) {
            if(count > 0) {
                armyHtml += `<div class="unit-icon">${UNIT_TYPES[type].icon} ${UNIT_TYPES[type].name} x${count} (💪${UNIT_TYPES[type].power})</div>`;
            }
        }
        if(!armyHtml) armyHtml = '<div>⚔️ ВАША АРМИЯ: (пусто)</div>';
        document.getElementById('armyDisplay').innerHTML = armyHtml;
        
        let enemyHtml = '';
        let enemyCounts = {};
        for(let e of currentWaveEnemies) {
            enemyCounts[e.name] = (enemyCounts[e.name] || 0) + 1;
        }
        for(let [name, count] of Object.entries(enemyCounts)) {
            let enemy = ENEMY_TYPES.find(e => e.name === name);
            enemyHtml += `<div class="enemy-icon">${enemy.icon} ${name} x${count} (💀${enemy.power})</div>`;
        }
        if(!enemyHtml) enemyHtml = '<div>💀 ВРАГИ В ЭТОЙ ВОЛНЕ: (нет)</div>';
        document.getElementById('enemyDisplay').innerHTML = enemyHtml;
    }
    
    function addLog(msg, isErr = false) {
        let log = document.getElementById('log');
        let p = document.createElement('p');
        p.innerHTML = msg;
        p.style.color = isErr ? "#ff8888" : "#aa8888";
        log.appendChild(p);
        p.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        if(log.children.length > 30) log.removeChild(log.children[0]);
    }
    
    function buyUnit(type, cost) {
        if(!gameActive) return;
        if(playerMoney >= cost) {
            playerMoney -= cost;
            army[type]++;
            updateUI();
            addLog(`💰 Куплен ${UNIT_TYPES[type].name} (+${UNIT_TYPES[type].power} силы)`);
        } else {
            addLog(`❌ Не хватает денег на ${UNIT_TYPES[type].name}!`, true);
        }
    }
    
    function nextWave() {
        if(!gameActive) return;
        if(enemiesRemaining <= 0) { victory(); return; }
        
        let playerPower = 0;
        for(let [type, count] of Object.entries(army)) {
            playerPower += count * UNIT_TYPES[type].power;
        }
        
        if(playerPower === 0) {
            addLog("💀 У вас нет армии! Геймо пал.", true);
            defeat();
            return;
        }
        
        currentWaveEnemies = generateWaveEnemies();
        let enemyPower = currentWaveEnemies.reduce((s,e) => s + e.power, 0);
        
        updateUI();
        addLog(`⚔️ ВОЛНА ${currentWave+1}! Сила врага: ${enemyPower}`);
        
        if(playerPower >= enemyPower) {
            let reward = 150 + currentWave * 10;
            playerMoney += reward;
            enemiesRemaining--;
            currentWave++;
            
            let lossPercent = 0.1 + Math.random() * 0.3;
            for(let type of Object.keys(army)) {
                army[type] = Math.max(0, Math.floor(army[type] * (1 - lossPercent)));
            }
            addLog(`✅ ПОБЕДА! +${reward}💰 Потери: ${Math.floor(lossPercent*100)}%`);
            updateUI();
            
            if(enemiesRemaining <= 0) victory();
            else {
                currentWaveEnemies = [];
                updateUI();
            }
        } else {
            let lossPercent = 0.5 + Math.random() * 0.3;
            for(let type of Object.keys(army)) {
                army[type] = Math.max(0, Math.floor(army[type] * (1 - lossPercent)));
            }
            updateUI();
            addLog(`💥 ПОРАЖЕНИЕ! Потеряно ${Math.floor(lossPercent*100)}% армии!`, true);
            currentWaveEnemies = [];
            updateUI();
            
            let total = army.infantry + army.spec + army.drone + army.tank + army.heavy;
            if(total === 0) defeat();
        }
    }
    
    function victory() {
        gameActive = false;
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('endScreen').style.display = 'block';
        document.getElementById('endTitle').innerHTML = '🏆 ПОБЕДА! 🏆';
        document.getElementById('endText').innerHTML = `Вы уничтожили ${selectedSavai.name}! Геймо выстоял.`;
    }
    
    function defeat() {
        gameActive = false;
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('endScreen').style.display = 'block';
        document.getElementById('endTitle').innerHTML = '💀 ПОРАЖЕНИЕ 💀';
        document.getElementById('endText').innerHTML = `Геймо пал под натиском ${selectedSavai.name}.`;
    }
    
    function startWar() {
        if(!selectedSavai) return;
        gameActive = true;
        currentWave = 0;
        enemiesRemaining = selectedSavai.enemiesTotal;
        playerMoney = 5000;
        army = { infantry: 0, spec: 0, drone: 0, tank: 0, heavy: 0 };
        currentWaveEnemies = [];
        updateUI();
        document.getElementById('savaiSelection').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        document.getElementById('endScreen').style.display = 'none';
        document.getElementById('log').innerHTML = '';
        addLog(`⚔️ ВОЙНА С ${selectedSavai.name}! ВРАГОВ: ${enemiesRemaining}`);
        addLog(`💰 У вас 5000 Г.долл. Покупайте юнитов!`);
    }
    
    function resetGame() {
        selectedSavai = null;
        document.getElementById('savaiSelection').style.display = 'block';
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('endScreen').style.display = 'none';
        document.querySelectorAll('.savai-card').forEach(c => c.classList.remove('selected'));
        document.getElementById('startWarBtn').disabled = true;
    }
    
    function renderSavaiList() {
        let container = document.getElementById('savaiList');
        container.innerHTML = '';
        SAVAI_LIST.forEach(s => {
            let card = document.createElement('div');
            card.className = 'savai-card';
            card.innerHTML = `<div class="savai-name">${s.name}</div>
                <div class="savai-desc">${s.description}</div>
                <div class="savai-stats">💰 Бюджет: ${s.budget.toLocaleString()} с.руб.</div>
                <div class="savai-stats">⚔️ Врагов: ${s.enemiesTotal.toLocaleString()}</div>
                <div class="savai-stats">🏛️ Столица: ${s.capital}</div>`;
            card.onclick = () => {
                document.querySelectorAll('.savai-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedSavai = s;
                document.getElementById('startWarBtn').disabled = false;
            };
            container.appendChild(card);
        });
    }
    
    document.querySelectorAll('.shop-btn').forEach(btn => {
        btn.onclick = () => {
            let unit = btn.dataset.unit;
            let cost = parseInt(btn.dataset.cost);
            buyUnit(unit, cost);
        };
    });
    document.getElementById('nextWaveBtn').onclick = nextWave;
    document.getElementById('startWarBtn').onclick = startWar;
    document.getElementById('resetBtn').onclick = resetGame;
    
    renderSavaiList();
</script>
</body>
</html>
