<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Blood War — CDFG Games</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a0a0a 0%, #0a0101 100%);
            font-family: 'Courier New', monospace;
            padding: 16px;
        }
        .game-container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(0,0,0,0.7);
            border-radius: 24px;
            padding: 20px;
            border: 2px solid #8b0000;
        }
        .title {
            text-align: center;
            font-size: 2rem;
            color: #ff4444;
            text-shadow: 0 0 5px darkred;
            margin-bottom: 20px;
        }
        .savai-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .savai-card {
            background: #2a0a0a;
            border: 2px solid #8b0000;
            border-radius: 16px;
            padding: 16px;
            width: 200px;
            cursor: pointer;
            transition: 0.1s;
        }
        .savai-card.selected {
            border-color: #00ff00;
            background: #3a1a1a;
        }
        .savai-name { font-size: 1.3rem; font-weight: bold; color: #ff8888; }
        .savai-desc { font-size: 0.7rem; color: #aa8888; margin: 8px 0; }
        .savai-stats { font-size: 0.8rem; color: #ffaa66; }
        .resources {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            background: #1a0505;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .resource {
            background: #2a0a0a;
            padding: 6px 12px;
            border-radius: 20px;
        }
        .shop {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .shop-btn {
            background: #3a0a0a;
            border: 1px solid #aa3333;
            color: #ffaaaa;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }
        .shop-btn:active { transform: scale(0.96); }
        .wave-info {
            background: #1a0505;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        .army-list {
            background: #1a0505;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .army-item {
            display: inline-block;
            background: #2a0a0a;
            padding: 4px 12px;
            border-radius: 20px;
            margin: 4px;
        }
        button {
            background: #8b0000;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .log {
            background: #0a0202;
            height: 150px;
            overflow-y: auto;
            padding: 8px;
            border-radius: 16px;
            font-size: 0.8rem;
            margin-top: 16px;
        }
        .log p { margin: 4px 0; border-left: 2px solid #8b0000; padding-left: 8px; }
        @media (max-width: 700px) {
            .savai-card { width: 100%; }
            .shop-btn { padding: 6px 12px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <div class="title">🔥 BLOOD WAR 🔥</div>
    
    <!-- Выбор Саваи -->
    <div id="savaiSelection">
        <div class="savai-selector" id="savaiList"></div>
        <button id="startWarBtn" disabled>⚔️ НАЧАТЬ ВОЙНУ ⚔️</button>
    </div>

    <!-- Игровой экран (скрыт сначала) -->
    <div id="gameScreen" style="display:none;">
        <div class="resources">
            <span class="resource">💰 <span id="money">5000</span> Г.долл.</span>
            <span class="resource">⚔️ ВОЛНА <span id="waveNum">0</span></span>
            <span class="resource">💀 ВРАГОВ ОСТАЛОСЬ: <span id="enemiesLeft">0</span></span>
        </div>

        <div class="army-list" id="armyList">
            ⚔️ ВАША АРМИЯ:
            <span class="army-item">⚔️ <span id="infantryCount">0</span> пехота</span>
            <span class="army-item">🎯 <span id="specCount">0</span> спец</span>
            <span class="army-item">🛸 <span id="droneCount">0</span> дроны</span>
            <span class="army-item">💣 <span id="tankCount">0</span> танки</span>
            <span class="army-item">🛡️ <span id="heavyCount">0</span> броня</span>
        </div>

        <div class="shop">
            <div class="shop-btn" data-unit="infantry" data-cost="100">⚔️ Пехота (100💰)</div>
            <div class="shop-btn" data-unit="spec" data-cost="200">🎯 Спец (200💰)</div>
            <div class="shop-btn" data-unit="drone" data-cost="250">🛸 Дрон (250💰)</div>
            <div class="shop-btn" data-unit="tank" data-cost="500">💣 Танк (500💰)</div>
            <div class="shop-btn" data-unit="heavy" data-cost="1000">🛡️ Броня (1000💰)</div>
        </div>

        <div class="wave-info" id="waveInfo">⚔️ НАЖМИТЕ «СЛЕДУЮЩАЯ ВОЛНА» ⚔️</div>
        <button id="nextWaveBtn">⚔️ СЛЕДУЮЩАЯ ВОЛНА ⚔️</button>

        <div class="log" id="log"></div>
    </div>

    <!-- Экран победы/поражения -->
    <div id="endScreen" style="display:none; text-align:center; margin-top:20px;">
        <h2 id="endTitle"></h2>
        <p id="endText"></p>
        <button id="resetBtn">🔄 НОВАЯ ИГРА</button>
    </div>
</div>

<script>
    // ---------- ДАННЫЕ О САВАЯХ ----------
    const SAVAI_LIST = [
        { 
            name: "Этерия", 
            fullName: "Этерийская Савая", 
            capital: "Астраполис", 
            budget: 100000, 
            enemiesTotal: 100,
            description: "Бедная, но гордая. У них мало ресурсов, но они фанатичны."
        },
        { 
            name: "Новая Савая", 
            fullName: "Новая Савая", 
            capital: "Оло (бывшая — Прелия)", 
            budget: 1000000, 
            enemiesTotal: 1000,
            description: "Средняя сила. Хорошо организованная армия."
        },
        { 
            name: "Саванкатр", 
            fullName: "Саванкатровская Савая", 
            capital: "Саванград (бывшая — Проннская земля)", 
            budget: 1000000000, 
            enemiesTotal: 100000,
            description: "Сердце ОСС. Огромный бюджет, элитные войска."
        }
    ];

    let selectedSavai = null;
    let gameActive = false;
    let currentWave = 0;
    let enemiesRemaining = 0;
    let playerMoney = 5000;
    
    // Юниты игрока (количество)
    let army = {
        infantry: 0,
        spec: 0,
        drones: 0,
        tanks: 0,
        heavy: 0
    };
    
    // Сила и ХП юнитов
    const UNIT_STATS = {
        infantry: { power: 10, hp: 20, cost: 100 },
        spec: { power: 15, hp: 15, cost: 200 },
        drones: { power: 20, hp: 12, cost: 250 },
        tanks: { power: 45, hp: 60, cost: 500 },
        heavy: { power: 90, hp: 120, cost: 1000 }
    };
    
    // Враги в волне (случайный набор)
    function generateWaveEnemies(waveNum, budget) {
        let enemyPower = 0;
        let enemyCount = 5 + Math.floor(waveNum / 5) + Math.floor(Math.random() * 10);
        let enemies = [];
        for(let i=0; i<enemyCount; i++) {
            let type = Math.random();
            let enemy;
            if (type < 0.5) enemy = { name: "Пехота ОСС", power: 8, hp: 15 };
            else if (type < 0.75) enemy = { name: "Дрон ОСС", power: 18, hp: 10 };
            else if (type < 0.9) enemy = { name: "Танк ОСС", power: 40, hp: 50 };
            else enemy = { name: "Броня ОСС", power: 80, hp: 100 };
            enemies.push(enemy);
            enemyPower += enemy.power;
        }
        // Модификатор от бюджета Саваи
        let budgetMod = budget / 100000;
        enemyPower = Math.floor(enemyPower * budgetMod);
        return { enemies, totalPower: enemyPower };
    }
    
    function addLog(msg, isError = false) {
        const logDiv = document.getElementById('log');
        const p = document.createElement('p');
        p.innerHTML = msg;
        p.style.color = isError ? "#ff8888" : "#aa8888";
        logDiv.appendChild(p);
        p.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        if(logDiv.children.length > 30) logDiv.removeChild(logDiv.children[0]);
    }
    
    function updateUI() {
        document.getElementById('money').innerText = playerMoney;
        document.getElementById('waveNum').innerText = currentWave;
        document.getElementById('enemiesLeft').innerText = enemiesRemaining;
        document.getElementById('infantryCount').innerText = army.infantry;
        document.getElementById('specCount').innerText = army.spec;
        document.getElementById('droneCount').innerText = army.drones;
        document.getElementById('tankCount').innerText = army.tanks;
        document.getElementById('heavyCount').innerText = army.heavy;
    }
    
    function buyUnit(unit, cost) {
        if (!gameActive) return false;
        if (playerMoney >= cost) {
            playerMoney -= cost;
            army[unit]++;
            updateUI();
            addLog(`💰 Куплен юнит: ${unit} (+${UNIT_STATS[unit].power} силы)`);
            return true;
        } else {
            addLog(`❌ Не хватает денег на ${unit}!`, true);
            return false;
        }
    }
    
    function nextWave() {
        if (!gameActive) return;
        if (enemiesRemaining <= 0) {
            victory();
            return;
        }
        
        // Генерируем врагов волны
        const waveEnemies = generateWaveEnemies(currentWave, selectedSavai.budget);
        let playerTotalPower = 0;
        let playerTotalHp = 0;
        for(let [unit, count] of Object.entries(army)) {
            playerTotalPower += count * UNIT_STATS[unit].power;
            playerTotalHp += count * UNIT_STATS[unit].hp;
        }
        
        if (playerTotalPower === 0) {
            addLog("💀 У вас нет армии! ОСС уничтожает Геймо.", true);
            defeat();
            return;
        }
        
        // Симуляция боя
        let playerDamage = playerTotalPower;
        let enemyDamage = waveEnemies.totalPower;
        
        let playerLosses = Math.min(1, Math.floor(playerTotalHp / (enemyDamage + 1))) + Math.floor(Math.random() * 3);
        let enemyLosses = 1;
        
        // Кто победил?
        if (playerDamage >= enemyDamage) {
            // Победа в волне
            let reward = 200 + currentWave * 10;
            playerMoney += reward;
            enemiesRemaining--;
            currentWave++;
            // Потери игрока
            let totalUnits = army.infantry + army.spec + army.drones + army.tanks + army.heavy;
            if (totalUnits > 0 && playerLosses > 0) {
                let lossRatio = Math.min(0.8, playerLosses / totalUnits);
                army.infantry = Math.max(0, Math.floor(army.infantry * (1 - lossRatio)));
                army.spec = Math.max(0, Math.floor(army.spec * (1 - lossRatio)));
                army.drones = Math.max(0, Math.floor(army.drones * (1 - lossRatio)));
                army.tanks = Math.max(0, Math.floor(army.tanks * (1 - lossRatio)));
                army.heavy = Math.max(0, Math.floor(army.heavy * (1 - lossRatio)));
            }
            addLog(`✅ ВОЛНА ${currentWave} ОТБИТА! +${reward}💰 Потери: ${playerLosses} юнитов.`);
            updateUI();
            if (enemiesRemaining <= 0) victory();
            else document.getElementById('waveInfo').innerHTML = `⚔️ ВОЛНА ${currentWave} ОТБИТА! ОСТАЛОСЬ ВРАГОВ: ${enemiesRemaining} ⚔️`;
        } else {
            // Поражение в волне — большие потери
            let lossRatio = 0.5 + Math.random() * 0.3;
            army.infantry = Math.max(0, Math.floor(army.infantry * (1 - lossRatio)));
            army.spec = Math.max(0, Math.floor(army.spec * (1 - lossRatio)));
            army.drones = Math.max(0, Math.floor(army.drones * (1 - lossRatio)));
            army.tanks = Math.max(0, Math.floor(army.tanks * (1 - lossRatio)));
            army.heavy = Math.max(0, Math.floor(army.heavy * (1 - lossRatio)));
            updateUI();
            addLog(`💥 ВОЛНА ${currentWave+1} НЕ ОТБИТА! Потеряно ${Math.floor(lossRatio*100)}% армии!`, true);
            if (army.infantry===0 && army.spec===0 && army.drones===0 && army.tanks===0 && army.heavy===0) {
                defeat();
            } else {
                document.getElementById('waveInfo').innerHTML = `💥 ПОРАЖЕНИЕ! ОСТАЛОСЬ ВРАГОВ: ${enemiesRemaining} 💥`;
            }
        }
    }
    
    function victory() {
        gameActive = false;
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('endScreen').style.display = 'block';
        document.getElementById('endTitle').innerHTML = '🏆 ПОБЕДА! 🏆';
        document.getElementById('endText').innerHTML = `Вы уничтожили ${selectedSavai.name}! Геймо выстоял.`;
    }
    
    function defeat() {
        gameActive = false;
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('endScreen').style.display = 'block';
        document.getElementById('endTitle').innerHTML = '💀 ПОРАЖЕНИЕ 💀';
        document.getElementById('endText').innerHTML = `Геймо пал под натиском ${selectedSavai.name}.`;
    }
    
    function startWar() {
        if (!selectedSavai) return;
        gameActive = true;
        currentWave = 0;
        enemiesRemaining = selectedSavai.enemiesTotal;
        playerMoney = 5000;
        army = { infantry: 0, spec: 0, drones: 0, tanks: 0, heavy: 0 };
        updateUI();
        document.getElementById('savaiSelection').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        document.getElementById('endScreen').style.display = 'none';
        document.getElementById('log').innerHTML = '';
        addLog(`⚔️ ВОЙНА С ${selectedSavai.name} НАЧАЛАСЬ! ВРАГОВ: ${enemiesRemaining}`);
        addLog(`💰 У вас 5000 Г.долл. Покупайте юнитов и атакуйте!`);
        document.getElementById('waveInfo').innerHTML = `⚔️ ВРАГОВ ОСТАЛОСЬ: ${enemiesRemaining} ⚔️`;
    }
    
    function resetGame() {
        selectedSavai = null;
        gameActive = false;
        document.getElementById('savaiSelection').style.display = 'block';
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('endScreen').style.display = 'none';
        // Сброс выбора
        document.querySelectorAll('.savai-card').forEach(card => card.classList.remove('selected'));
        document.getElementById('startWarBtn').disabled = true;
    }
    
    // Отрисовка списка Савай
    function renderSavaiList() {
        const container = document.getElementById('savaiList');
        container.innerHTML = '';
        SAVAI_LIST.forEach(s => {
            const card = document.createElement('div');
            card.className = 'savai-card';
            card.innerHTML = `
                <div class="savai-name">${s.name}</div>
                <div class="savai-desc">${s.description}</div>
                <div class="savai-stats">💰 Бюджет: ${s.budget.toLocaleString()} с.руб.</div>
                <div class="savai-stats">⚔️ Врагов: ${s.enemiesTotal.toLocaleString()}</div>
                <div class="savai-stats">🏛️ Столица: ${s.capital}</div>
            `;
            card.onclick = () => {
                document.querySelectorAll('.savai-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedSavai = s;
                document.getElementById('startWarBtn').disabled = false;
            };
            container.appendChild(card);
        });
    }
    
    // Назначение обработчиков
    document.querySelectorAll('.shop-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const unit = btn.dataset.unit;
            const cost = parseInt(btn.dataset.cost);
            buyUnit(unit, cost);
        });
    });
    document.getElementById('nextWaveBtn').onclick = () => nextWave();
    document.getElementById('startWarBtn').onclick = () => startWar();
    document.getElementById('resetBtn').onclick = () => resetGame();
    
    renderSavaiList();
</script>
</body>
    </html>
