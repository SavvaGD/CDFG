<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Тетрис — CDFG Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', monospace;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
            border: 1px solid rgba(0, 255, 136, 0.3);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        canvas {
            display: block;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #0f172a;
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 140px;
        }

        .score-box {
            background: #1e293b;
            padding: 12px 20px;
            border-radius: 16px;
            text-align: center;
        }

        .score-label {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .score-value {
            font-size: 2rem;
            font-weight: bold;
            color: #00ff88;
            font-family: monospace;
        }

        .next-box {
            background: #1e293b;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
        }

        .next-label {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        canvas.next-canvas {
            width: 120px;
            height: 120px;
            margin: 0 auto;
        }

        button {
            background: linear-gradient(135deg, #00ff88, #00b4d8);
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        .controls {
            font-size: 0.7rem;
            color: #64748b;
            text-align: center;
            margin-top: 8px;
        }

        @media (max-width: 600px) {
            .game-container { padding: 12px; gap: 12px; }
            .score-value { font-size: 1.5rem; }
            .info-panel { min-width: 100px; }
            button { padding: 6px 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="tetrisCanvas" width="300" height="600"></canvas>
    <div class="info-panel">
        <div class="score-box">
            <div class="score-label">🎯 СЧЁТ</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="next-box">
            <div class="next-label">⏩ СЛЕДУЮЩАЯ</div>
            <canvas id="nextCanvas" width="120" height="120" class="next-canvas"></canvas>
        </div>
        <button id="restartBtn">🔄 Новая игра</button>
        <div class="controls">
            🎮 ← → ↓ вращение: ↑ / W
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('tetrisCanvas');
    const ctx = canvas.getContext('2d');
    const nextCanvas = document.getElementById('nextCanvas');
    const nextCtx = nextCanvas.getContext('2d');
    const scoreSpan = document.getElementById('score');

    // Размеры
    const COLS = 10;
    const ROWS = 20;
    const CELL_SIZE = canvas.width / COLS;
    const NEXT_CELL_SIZE = nextCanvas.width / 4;

    // Фигуры
    const SHAPES = [
        {   // I
            matrix: [[1,1,1,1]],
            color: '#00e5f0'
        },
        {   // O
            matrix: [[1,1],[1,1]],
            color: '#f0e000'
        },
        {   // T
            matrix: [[0,1,0],[1,1,1]],
            color: '#c000f0'
        },
        {   // S
            matrix: [[0,1,1],[1,1,0]],
            color: '#00f040'
        },
        {   // Z
            matrix: [[1,1,0],[0,1,1]],
            color: '#f04000'
        },
        {   // L
            matrix: [[1,0,0],[1,1,1]],
            color: '#f0a000'
        },
        {   // J
            matrix: [[0,0,1],[1,1,1]],
            color: '#0040f0'
        }
    ];

    let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
    let currentPiece = null;
    let currentX = 0, currentY = 0;
    let score = 0;
    let gameRunning = true;
    let gameLoop = null;
    let nextPiece = null;

    function randomPiece() {
        const idx = Math.floor(Math.random() * SHAPES.length);
        const shape = SHAPES[idx];
        return {
            matrix: shape.matrix.map(row => [...row]),
            color: shape.color
        };
    }

    function spawnNewPiece() {
        if (!nextPiece) {
            nextPiece = randomPiece();
        }
        currentPiece = {
            matrix: nextPiece.matrix.map(row => [...row]),
            color: nextPiece.color
        };
        nextPiece = randomPiece();
        
        currentX = Math.floor((COLS - currentPiece.matrix[0].length) / 2);
        currentY = 0;
        
        if (collision()) {
            gameOver();
            return false;
        }
        return true;
    }

    function collision() {
        for (let y = 0; y < currentPiece.matrix.length; y++) {
            for (let x = 0; x < currentPiece.matrix[y].length; x++) {
                if (currentPiece.matrix[y][x] !== 0) {
                    const boardX = currentX + x;
                    const boardY = currentY + y;
                    if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) {
                        return true;
                    }
                    if (boardY >= 0 && board[boardY][boardX] !== 0) {
                        return true;
                    }
                }
            }
        }
        return false;
    }

    function mergePiece() {
        for (let y = 0; y < currentPiece.matrix.length; y++) {
            for (let x = 0; x < currentPiece.matrix[y].length; x++) {
                if (currentPiece.matrix[y][x] !== 0) {
                    const boardX = currentX + x;
                    const boardY = currentY + y;
                    if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                        board[boardY][boardX] = currentPiece.color;
                    }
                }
            }
        }
        
        clearLines();
        spawnNewPiece();
        draw();
    }

    function clearLines() {
        let linesCleared = 0;
        for (let y = ROWS - 1; y >= 0; y--) {
            let full = true;
            for (let x = 0; x < COLS; x++) {
                if (board[y][x] === 0) {
                    full = false;
                    break;
                }
            }
            if (full) {
                board.splice(y, 1);
                board.unshift(Array(COLS).fill(0));
                y++;
                linesCleared++;
            }
        }
        
        if (linesCleared > 0) {
            const points = [0, 100, 300, 600, 1000];
            const addScore = points[Math.min(linesCleared, 4)];
            score += addScore;
            scoreSpan.textContent = score;
        }
    }

    function movePiece(dx, dy) {
        if (!gameRunning) return false;
        currentX += dx;
        currentY += dy;
        if (collision()) {
            currentX -= dx;
            currentY -= dy;
            if (dy === 1) {
                mergePiece();
            }
            return false;
        }
        draw();
        return true;
    }

    function rotatePiece() {
        if (!gameRunning) return;
        const matrix = currentPiece.matrix;
        const rotated = matrix[0].map((_, idx) => matrix.map(row => row[idx]).reverse());
        const originalMatrix = currentPiece.matrix;
        currentPiece.matrix = rotated;
        if (collision()) {
            currentPiece.matrix = originalMatrix;
        }
        draw();
    }

    function gameOver() {
        if (!gameRunning) return;
        gameRunning = false;
        if (gameLoop) clearInterval(gameLoop);
        gameLoop = null;
        
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff88';
        ctx.font = 'bold 24px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
        ctx.font = '16px monospace';
        ctx.fillStyle = '#e2e8f0';
        ctx.fillText('Счёт: ' + score, canvas.width/2, canvas.height/2 + 20);
        ctx.fillText('Нажмите "Новая игра"', canvas.width/2, canvas.height/2 + 60);
    }

    function draw() {
        // Отрисовка поля
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Сетка
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= COLS; i++) {
            ctx.beginPath();
            ctx.moveTo(i * CELL_SIZE, 0);
            ctx.lineTo(i * CELL_SIZE, canvas.height);
            ctx.stroke();
            ctx.moveTo(0, i * CELL_SIZE);
            ctx.lineTo(canvas.width, i * CELL_SIZE);
            ctx.stroke();
        }
        
        // Закреплённые блоки
        for (let y = 0; y < ROWS; y++) {
            for (let x = 0; x < COLS; x++) {
                if (board[y][x] !== 0) {
                    ctx.fillStyle = board[y][x];
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = board[y][x];
                    ctx.fillRect(x * CELL_SIZE + 1, y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                }
            }
        }
        
        // Текущая фигура
        if (currentPiece) {
            for (let y = 0; y < currentPiece.matrix.length; y++) {
                for (let x = 0; x < currentPiece.matrix[y].length; x++) {
                    if (currentPiece.matrix[y][x]) {
                        ctx.fillStyle = currentPiece.color;
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = currentPiece.color;
                        ctx.fillRect((currentX + x) * CELL_SIZE + 1, (currentY + y) * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                    }
                }
            }
        }
        
        ctx.shadowBlur = 0;
        
        // Отрисовка следующей фигуры
        nextCtx.fillStyle = '#0f172a';
        nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
        if (nextPiece) {
            const matrix = nextPiece.matrix;
            const offsetX = (4 - matrix[0].length) * NEXT_CELL_SIZE / 2;
            const offsetY = (4 - matrix.length) * NEXT_CELL_SIZE / 2;
            for (let y = 0; y < matrix.length; y++) {
                for (let x = 0; x < matrix[y].length; x++) {
                    if (matrix[y][x]) {
                        nextCtx.fillStyle = nextPiece.color;
                        nextCtx.shadowBlur = 4;
                        nextCtx.fillRect(offsetX + x * NEXT_CELL_SIZE + 1, offsetY + y * NEXT_CELL_SIZE + 1, NEXT_CELL_SIZE - 2, NEXT_CELL_SIZE - 2);
                    }
                }
            }
            nextCtx.shadowBlur = 0;
        }
    }

    function restartGame() {
        if (gameLoop) clearInterval(gameLoop);
        board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        score = 0;
        scoreSpan.textContent = '0';
        gameRunning = true;
        nextPiece = randomPiece();
        spawnNewPiece();
        draw();
        gameLoop = setInterval(() => {
            if (gameRunning) {
                movePiece(0, 1);
            }
        }, 400);
    }

    // Управление
    window.addEventListener('keydown', (e) => {
        if (!gameRunning) return;
        const key = e.key;
        if (key === 'ArrowLeft') movePiece(-1, 0);
        else if (key === 'ArrowRight') movePiece(1, 0);
        else if (key === 'ArrowDown') movePiece(0, 1);
        else if (key === 'ArrowUp' || key === 'w' || key === 'W') rotatePiece();
        e.preventDefault();
    });
    
    // Сенсорное управление для телефонов
    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        touchStartX = e.touches[0].clientX - rect.left;
        touchStartY = e.touches[0].clientY - rect.top;
    });
    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const endX = e.changedTouches[0].clientX - rect.left;
        const endY = e.changedTouches[0].clientY - rect.top;
        const dx = endX - touchStartX;
        const dy = endY - touchStartY;
        if (Math.abs(dx) < 15 && Math.abs(dy) < 15) {
            rotatePiece();
            return;
        }
        if (Math.abs(dx) > Math.abs(dy)) {
            if (dx > 0) movePiece(1, 0);
            else movePiece(-1, 0);
        } else {
            if (dy > 0) movePiece(0, 1);
        }
    });

    document.getElementById('restartBtn').addEventListener('click', restartGame);

    // Старт
    restartGame();
</script>
</body>
</html>
