<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action: manipulation">
  <title>АРКАДНОЕ БЕЗУМИЕ • 1985</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0c0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      touch-action: pan-x pan-y; 
    }
    #game-wrapper {
      position: relative;
      width: 100%;
      max-width: 800px;
      aspect-ratio: 4/3;
      background: #000;
      box-shadow: 0 0 40px #9d00ff88, 0 0 10px #ff00c8;
      border: 4px solid #3e2a5f;
      display: flex;
      flex-direction: column;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: crisp-edges;
    }
    #ui-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #1a1025ee;
      border-top: 3px solid #c040ff;
      color: #f0e6ff;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 5px;
      font-weight: bold;
      font-size: clamp(14px, 4vw, 20px);
      text-shadow: 0 0 8px #ff66aa;
      backdrop-filter: blur(4px);
      letter-spacing: 1px;
    }
    .health-bar {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .heart {
      color: #ff4466;
      font-size: 1.4em;
      filter: drop-shadow(0 0 6px red);
    }
    .btn-group {
      display: flex;
      gap: 12px;
    }
    .ctrl-btn {
      background: #2d1b3a;
      border: 2px solid #b44dff;
      color: #fff;
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 16px;
      background: #3a2350;
      box-shadow: 0 0 12px #b44dffaa;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }
    .ctrl-btn:active {
      background: #b44dff;
      color: #000;
    }
    @media (max-width: 600px) {
      .ctrl-btn {
        padding: 6px 12px;
        font-size: 14px;
      }
    }
    #room-indicator {
      background: #000;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid #ffe484;
      color: #ffe484;
    }
  </style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="gameCanvas" width="640" height="480"></canvas>
  <div id="ui-panel">
    <div class="health-bar">
      <span class="heart">❤️</span>
      <span id="healthDisplay">3</span>
    </div>
    <div id="room-indicator">КОМНАТА 1</div>
    <div class="btn-group">
      <div class="ctrl-btn" id="btnAction">🖐️ ДЕЙСТВИЕ</div>
      <div class="ctrl-btn" id="btnCrouch">⬇️ ПРИСЕД</div>
    </div>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ---------- СОСТОЯНИЕ ИГРЫ ----------
    const STATE = {
      room: 1,
      maxRooms: 50,
      health: 3,
      maxHealth: 5,
      isCrouching: false,
      gameOver: false,
      win: false,
      message: '',
      messageTimer: 0,

      // Монстры / события
      ghostActive: false,       // призрак в текущей комнате
      ghostTimer: 0,
      closetRedEyes: false,    // глаз в шкафу (красноватый шкаф)
      pacmanChase: false,      // босс Пакман (комната 25)
      pacmanPhase: 0,
      preggWindow: false,      // окно с прегом (40-49)
      pregJuniorAttack: false,
      paintingCurse: false,    // картина "круг"

      // Дверь для финального босса
      bossDoorFound: false,
      exitUnlocked: false,

      // Управление шкафом
      inCloset: false,
      closetSafe: true,       // если шкаф обычный - безопасен
    };

    // Генерация параметров комнаты
    function generateRoom(roomNumber) {
      // Сброс временных флагов
      STATE.ghostActive = false;
      STATE.closetRedEyes = false;
      STATE.pacmanChase = false;
      STATE.preggWindow = false;
      STATE.pregJuniorAttack = false;
      STATE.paintingCurse = false;
      STATE.bossDoorFound = false;
      STATE.exitUnlocked = false;
      STATE.inCloset = false;
      STATE.closetSafe = true;
      STATE.message = '';
      
      // Локации и особенности
      if (roomNumber === 25) {
        STATE.pacmanChase = true;
        STATE.pacmanPhase = 0;
        STATE.message = "ПАКМАН ПРОСНУЛСЯ! БЕГИ!";
        STATE.messageTimer = 120;
      }
      else if (roomNumber === 50) {
        // Кабинет босса-ары: нужно найти дверь
        STATE.bossDoorFound = false;
        STATE.message = "НАЙДИ ДВЕРЬ, ЧТОБЫ ВЫЙТИ";
        STATE.messageTimer = 150;
      }
      else if (roomNumber >= 40 && roomNumber <= 49) {
        // Оконные комнаты: прег
        STATE.preggWindow = true;
        STATE.message = "ОКНО ШЕВЕЛИТСЯ...";
        STATE.messageTimer = 80;
      }
      else if (roomNumber >= 30 && roomNumber <= 39) {
        // Микросхемники: могут быть картины-круги
        if (Math.random() < 0.45) {
          STATE.paintingCurse = true;
          STATE.message = "КАРТИНА СМОТРИТ НА ТЕБЯ";
          STATE.messageTimer = 100;
        }
      }
      else if (roomNumber >= 25 && roomNumber <= 30) {
        // Глитчивые коридоры
        STATE.message = "ГЛИТЧ-КОРИДОР";
        STATE.messageTimer = 60;
      }

      // Призрак каждые 3 комнаты (кроме особых)
      if (roomNumber % 3 === 0 && roomNumber < 50 && roomNumber !== 25) {
        STATE.ghostActive = true;
        STATE.ghostTimer = 180; // время до атаки, если не спрятался
        STATE.message = "ПРИЗРАК РЯДОМ! ПРЯЧЬСЯ В ШКАФ!";
        STATE.messageTimer = 100;
      }

      // Глаз в шкафу (красноватый оттенок) – случайно в некоторых комнатах
      if (roomNumber < 50 && Math.random() < 0.3 && !STATE.ghostActive) {
        STATE.closetRedEyes = true;
      }
    }

    // Инициализация первой комнаты
    generateRoom(1);

    // ---------- ОБРАБОТЧИКИ ДЕЙСТВИЙ ----------
    function doAction() {
      if (STATE.gameOver || STATE.win) return;

      let room = STATE.room;

      // Проверка: финальная комната 50 – поиск двери
      if (room === 50 && !STATE.bossDoorFound && !STATE.exitUnlocked) {
        STATE.bossDoorFound = true;
        STATE.exitUnlocked = true;
        STATE.message = "ДВЕРЬ НАЙДЕНА! ВЫХОДИ!";
        STATE.messageTimer = 140;
        return;
      }

      // Если выход разблокирован в 50 комнате и игрок жмёт действие
      if (room === 50 && STATE.exitUnlocked) {
        STATE.win = true;
        STATE.message = "ТЫ ВЫРВАЛСЯ ИЗ АВТОМАТА!";
        STATE.messageTimer = 300;
        return;
      }

      // Взаимодействие со шкафом (прятаться)
      if (STATE.ghostActive || STATE.closetRedEyes || room < 50) {
        // Шкаф доступен почти всегда, кроме особых условий
        if (STATE.inCloset) {
          // Выйти из шкафа
          STATE.inCloset = false;
          STATE.message = "ВЫЛЕЗ ИЗ ШКАФА";
          STATE.messageTimer = 40;
        } else {
          // Залезть в шкаф
          STATE.inCloset = true;
          // Проверка на глаз
          if (STATE.closetRedEyes) {
            // Глаз атакует!
            STATE.health -= 1;
            STATE.message = "ГЛАЗ В ШКАФУ! -1 ЖИЗНЬ";
            STATE.messageTimer = 90;
            STATE.closetRedEyes = false; // глаз исчезает после атаки
            if (STATE.health <= 0) {
              gameOverSequence();
            }
          } else {
            STATE.message = "ТЫ В ШКАФУ";
            STATE.messageTimer = 40;
          }
        }
        return;
      }

      // Если прег-окно активно (комнаты 40-49) и игрок не в шкафу – действие может спровоцировать атаку
      if (STATE.preggWindow && !STATE.inCloset) {
        STATE.pregJuniorAttack = true;
        STATE.message = "РУКА ХВАТАЕТ ТЕБЯ!";
        STATE.messageTimer = 70;
        setTimeout(() => {
          if (STATE.pregJuniorAttack && !STATE.gameOver && !STATE.win && STATE.room >= 40 && STATE.room <= 49) {
            STATE.health -= 2;
            STATE.message = "ГОЛОВА РАЗДАВЛЕНА! -2";
            STATE.messageTimer = 100;
            STATE.pregJuniorAttack = false;
            if (STATE.health <= 0) gameOverSequence();
          }
        }, 600);
        return;
      }

      STATE.message = "НИЧЕГО НЕ ПРОИЗОШЛО";
      STATE.messageTimer = 40;
    }

    function toggleCrouch() {
      if (STATE.gameOver || STATE.win) return;
      STATE.isCrouching = !STATE.isCrouching;
      STATE.message = STATE.isCrouching ? "ПРИСЕЛ" : "ВСТАЛ";
      STATE.messageTimer = 30;
    }

    function moveForward() {
      if (STATE.gameOver || STATE.win) return;
      if (STATE.room >= STATE.maxRooms) return;

      // Если призрак активен и игрок не в шкафу – атака
      if (STATE.ghostActive && !STATE.inCloset && STATE.room < 50) {
        STATE.health -= 1;
        STATE.message = "ПРИЗРАК ПОЙМАЛ ТЕБЯ! -1";
        STATE.messageTimer = 90;
        STATE.ghostActive = false;
        if (STATE.health <= 0) {
          gameOverSequence();
          return;
        }
      }

      // Пакман-босс комната 25: нужно пробежать несколько "подкомнат"
      if (STATE.room === 25 && STATE.pacmanChase) {
        STATE.pacmanPhase++;
        if (STATE.pacmanPhase >= 3) {
          // Сбежали от пакмана
          STATE.pacmanChase = false;
          STATE.message = "ТЫ УБЕЖАЛ ОТ ПАКМАНА!";
          STATE.messageTimer = 100;
          STATE.room = 26;
          generateRoom(26);
          return;
        } else {
          STATE.message = `БЕГИ! ПАКМАН БЛИЗКО (${STATE.pacmanPhase}/3)`;
          STATE.messageTimer = 60;
          return; // остаёмся в комнате 25, но фаза меняется
        }
      }

      // Переход в следующую комнату
      STATE.room++;
      if (STATE.room > STATE.maxRooms) STATE.room = STATE.maxRooms;
      generateRoom(STATE.room);

      // Картина "круг" наносит урон при входе, если активна
      if (STATE.paintingCurse && !STATE.inCloset) {
        STATE.health -= 1;
        STATE.message = "КАРТИНА ВЫСОСАЛА ЖИЗНЬ! -1";
        STATE.messageTimer = 90;
        STATE.paintingCurse = false;
        if (STATE.health <= 0) gameOverSequence();
      }
    }

    function gameOverSequence() {
      STATE.gameOver = true;
      STATE.health = 0;
      STATE.message = "ТЫ УМЕР. GAME OVER";
      STATE.messageTimer = 500;
    }

    // ---------- УПРАВЛЕНИЕ ----------
    function setupControls() {
      document.getElementById('btnAction').addEventListener('click', (e) => {
        e.preventDefault();
        doAction();
      });
      document.getElementById('btnCrouch').addEventListener('click', (e) => {
        e.preventDefault();
        toggleCrouch();
      });

      // Клавиатура
      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
          e.preventDefault();
          moveForward();
        } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
          e.preventDefault();
          toggleCrouch();
        } else if (e.key === ' ' || e.key === 'Space' || e.key === 'e' || e.key === 'E') {
          e.preventDefault();
          doAction();
        }
      });

      // Джойстик/свайп для телефона (простой тап по верхней части канваса = вперёд)
      canvas.addEventListener('click', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const y = e.clientY - rect.top;
        const height = rect.height;
        if (y < height * 0.5) {
          moveForward();
        }
      });
    }

    // ---------- ОТРИСОВКА (ПЕРВОЕ ЛИЦО, ХОРРОР, ДЕТАЛИ) ----------
    function draw() {
      ctx.clearRect(0, 0, 640, 480);
      
      // Фон в зависимости от локации
      let bgColor = '#1a1020';
      if (STATE.room >= 25 && STATE.room <= 30) bgColor = '#1f1a2e';
      else if (STATE.room >= 30 && STATE.room <= 39) bgColor = '#0d2b1f';
      else if (STATE.room >= 40 && STATE.room <= 49) bgColor = '#1c1a2b';
      else if (STATE.room === 50) bgColor = '#230f1a';
      
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, 640, 480);

      // Эффект глитча/старого экрана
      ctx.fillStyle = 'rgba(255,0,200,0.04)';
      for (let i=0; i<20; i++) {
        ctx.fillRect(Math.random()*640, Math.random()*480, 2, 8);
      }

      // Перспектива коридора (вид от первого лица)
      drawFirstPersonCorridor();

      // Детали окружения
      drawEnvironmentDetails();

      // Монстры/существа
      if (STATE.ghostActive && !STATE.inCloset) drawGhost();
      if (STATE.pacmanChase && STATE.room === 25) drawPacman();
      if (STATE.preggWindow && STATE.room >= 40 && STATE.room <= 49) drawPreggWindow();
      if (STATE.pregJuniorAttack) drawPregJunior();
      if (STATE.paintingCurse) drawPaintingCircle();
      if (STATE.room === 50 && STATE.bossDoorFound && !STATE.win) drawBossDoor();

      // Шкаф (если игрок внутри – показать затемнение)
      if (STATE.inCloset) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0,0,640,480);
        ctx.fillStyle = '#aa88ff';
        ctx.font = '24px "Courier New"';
        ctx.fillText('В ШКАФУ', 250, 240);
      }

      // Сообщения
      if (STATE.message && STATE.messageTimer > 0) {
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 22px "Courier New"';
        ctx.shadowColor = '#ff00c8';
        ctx.shadowBlur = 12;
        ctx.fillText(STATE.message, 40, 80);
        ctx.shadowBlur = 0;
        ctx.shadowColor = 'transparent';
        STATE.messageTimer--;
      }

      // Победа / Game Over
      if (STATE.win) {
        ctx.fillStyle = '#0f0';
        ctx.font = '36px "Courier New"';
        ctx.fillText('ВЫХОД ИЗ АВТОМАТА', 80, 220);
      } else if (STATE.gameOver) {
        ctx.fillStyle = '#f22';
        ctx.font = '38px "Courier New"';
        ctx.fillText('GAME OVER', 180, 230);
      }

      // Обновление UI
      document.getElementById('healthDisplay').textContent = STATE.health;
      document.getElementById('room-indicator').textContent = `КОМНАТА ${STATE.room}`;
    }

    function drawFirstPersonCorridor() {
      // Стены, пол, потолок
      ctx.fillStyle = '#2d1a3a';
      ctx.beginPath();
      ctx.moveTo(200, 140); ctx.lineTo(440, 140); ctx.lineTo(540, 380); ctx.lineTo(100, 380); ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#aa55ff';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Пол
      ctx.fillStyle = '#1c1028';
      ctx.beginPath();
      ctx.moveTo(100, 380); ctx.lineTo(540, 380); ctx.lineTo(640, 480); ctx.lineTo(0, 480); ctx.closePath();
      ctx.fill();
    }

    function drawEnvironmentDetails() {
      // Шкаф (если не в шкафу, рисуем его)
      if (!STATE.inCloset) {
        let closetColor = '#4a3562';
        if (STATE.closetRedEyes) closetColor = '#6b2a3a';
        ctx.fillStyle = closetColor;
        ctx.fillRect(520, 180, 70, 170);
        ctx.fillStyle = '#221133';
        ctx.fillRect(530, 200, 20, 40);
        ctx.fillRect(560, 200, 20, 40);
        if (STATE.closetRedEyes) {
          ctx.fillStyle = '#ff3333';
          ctx.beginPath();
          ctx.arc(540, 220, 8, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = '#ff0000';
          ctx.beginPath();
          ctx.arc(570, 220, 8, 0, Math.PI*2);
          ctx.fill();
        }
      }

      // Картины на стенах (если не проклятая)
      if (!STATE.paintingCurse) {
        ctx.fillStyle = '#5e4a3a';
        ctx.fillRect(80, 200, 50, 70);
        ctx.fillStyle = '#d4af37';
        ctx.fillRect(90, 210, 30, 30);
      }
    }

    function drawGhost() {
      ctx.fillStyle = '#ccffff';
      ctx.shadowColor = '#00ffff';
      ctx.shadowBlur = 25;
      ctx.beginPath();
      ctx.arc(320, 200, 45, 0, Math.PI, true);
      ctx.fill();
      for (let i=0; i<4; i++) {
        ctx.beginPath();
        ctx.arc(300 + i*18, 240, 12, 0, Math.PI);
        ctx.fill();
      }
      ctx.fillStyle = '#000';
      ctx.arc(300, 185, 6, 0, Math.PI*2);
      ctx.arc(340, 185, 6, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function drawPacman() {
      ctx.fillStyle = '#ffff00';
      ctx.shadowColor = '#ffaa00';
      ctx.shadowBlur = 30;
      ctx.beginPath();
      ctx.arc(400, 240, 55, 0.2, Math.PI*1.8);
      ctx.lineTo(400, 240);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(380, 210, 8, 0, Math.PI*2);
      ctx.fill();
    }

    function drawPreggWindow() {
      ctx.fillStyle = '#1a2b3c';
      ctx.fillRect(70, 140, 90, 110);
      ctx.fillStyle = '#557799';
      ctx.fillRect(80, 150, 70, 40);
    }

    function drawPregJunior() {
      ctx.fillStyle = '#aa4466';
      ctx.fillRect(300, 300, 60, 100);
      ctx.fillStyle = '#ff6677';
      for (let i=0;i<4;i++) ctx.fillRect(310+i*8, 310, 5, 30);
    }

    function drawPaintingCircle() {
      ctx.fillStyle = '#330000';
      ctx.fillRect(80, 200, 50, 70);
      ctx.fillStyle = '#cc0000';
      ctx.beginPath();
      ctx.arc(105, 235, 18, 0, 2*Math.PI);
      ctx.fill();
    }

    function drawBossDoor() {
      ctx.fillStyle = '#aa5500';
      ctx.fillRect(280, 130, 80, 160);
      ctx.fillStyle = '#ffcc00';
      ctx.font = '18px "Courier New"';
      ctx.fillText('ВЫХОД', 290, 220);
    }

    // ---------- ИГРОВОЙ ЦИКЛ ----------
    function gameLoop() {
      if (!STATE.gameOver && !STATE.win) {
        // Таймер призрака
        if (STATE.ghostActive && !STATE.inCloset && STATE.ghostTimer > 0) {
          STATE.ghostTimer--;
          if (STATE.ghostTimer === 0) {
            STATE.health -= 1;
            STATE.message = "ПРИЗРАК АТАКОВАЛ!";
            STATE.messageTimer = 80;
            STATE.ghostActive = false;
            if (STATE.health <= 0) gameOverSequence();
          }
        }
      }
      draw();
      requestAnimationFrame(gameLoop);
    }

    setupControls();
    gameLoop();
  })();
</script>
</body>
</html>
